
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZSec Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<script>
    let search = document.getElementById("search");
    let cards = document.querySelectorAll(".card");

    search.addEventListener("keyup",
        function() {
            let value = search.value.toLowerCase();

            cards.forEach(card => {
                let name = card.getAttribute("data-name");

                if(name.includes(value)){
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });
</script>
<body>

    <!-- NAVBAR -->
        <h2>💀ZSec Store Pro</h2>
     </header>

     <!-- HERO -->
      <section class="hero">
        <h1>Hacking Gadgets Store</h1>
        <p>Cybersecurity Tools Collection</p>
      </section>

      <!-- SEARCH FILTER -->
       <div class="search-box">
        <input type="text" placeholder="search product..." id="search">
       </div>

       <!-- PRODUCTS -->
        <section class="products" id="productList">
            <div class="card" data-name="esp32">
                <img src="./esp8266.jpg" alt="ESP32">
                <p>ESP32 Marauder </p>
            </div>

            <div class="card" data-name="respberry">
                <img src="./resp.jpg" alt="respberrypi">
                <h3>Raspberry Pi</h3>
            </div>

            <div class="card" data-name="rtl-sdr">
                <img src="./rtl.jpg" alt="RTL-SDR">
                <h3>RTL-SDR HACK5</h3>
            </div>

            <div class="card" data-name="deauther">
                <img src="./watch.jpg" alt="Deauther watch">
                <h3>WiFi Desuther</h3>
            </div>

            <div class="card" data-name="rubberduckey">
                <img src="./duckey.jpg" alt="USB Rubber Duckey">
                <h3>USB Rubber Duckey<h3>
            </div>

            <div class="card" data-name="keylogger">
                <img src="./key.jpg" alt="Key Croc">
                <h3>Keylogger</h3>
            </div>

            <div class="card" data-name="flipper">
                <img src="./flipper.jpg" alt="Flipperzero">
                <h3>Flipper Zero</h3>
            </div>

            <div class="card" data-name="hackrf">
                <img src="./hackrf.jpg" alt="Hackrf">
                <h3>HackRF One</h3>
            </div>

            <div class="card" data-name="pinapple">
                <img src="./pinapple.jpg" alt="WiFi pinapple">
                <h3>WiFi Pinapple</h3>
            </div>

        </section>
    
</body>
</html>
